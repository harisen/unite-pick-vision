<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ingame preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1090px;
      height: 614px;
      position: relative;
      overflow: hidden;
      font-family: 'Segoe UI', 'Hiragino Sans', sans-serif;
    }

    /* ゲーム画面の背景を再現 */
    .game-bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(160deg, #b8c8e8 0%, #c0cce0 30%, #d0c8e8 60%, #c8c0e0 100%);
    }

    /* 最終準備中 ヘッダー */
    .game-header {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
    }
    .game-header .label {
      font-size: 13px;
      font-weight: 700;
      color: #444;
      background: linear-gradient(90deg, #e0d0ff, #ffd0f0);
      padding: 2px 16px;
      border-radius: 10px;
    }
    .game-header .count {
      font-size: 32px;
      font-weight: 900;
      color: #ff6030;
      text-shadow: 0 2px 4px rgba(0,0,0,0.2);
      margin-top: 2px;
    }

    /* 味方トレーナー（ダミー） */
    .trainers {
      position: absolute;
      top: 70px;
      left: 0; right: 0;
      height: 240px;
      display: flex;
      align-items: flex-end;
      justify-content: space-around;
      padding: 0 20px;
    }
    .trainer-dummy {
      width: 120px;
      height: 200px;
      background: rgba(255,255,255,0.15);
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 8px;
      gap: 4px;
    }
    .trainer-dummy .t-icon {
      width: 60px;
      height: 120px;
      background: rgba(255,255,255,0.2);
      border-radius: 6px;
    }
    .trainer-dummy .t-name {
      font-size: 10px;
      color: rgba(255,255,255,0.8);
      font-weight: 600;
    }

    /* 赤枠イメージ（参考用、実際はなし） */
    .red-outline {
      position: absolute;
      top: 68px;
      left: 18px;
      right: 18px;
      height: 250px;
      border: 2px dashed rgba(255,80,80,0.4);
      border-radius: 4px;
      pointer-events: none;
    }

    /* =====================
       オーバーレイ本体
    ===================== */
    #top-bar {
      position: absolute;
      top: 76px;
      left: 22px;
      right: 22px;
      display: flex;
      gap: 8px;
      z-index: 10;
    }

    .top-card {
      flex: 1;
      background: rgba(8, 8, 18, 0.85);
      border: 1.5px solid rgba(255,255,255,0.18);
      border-radius: 10px;
      padding: 8px 6px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      backdrop-filter: blur(6px);
    }

    .top-card img {
      width: 64px;
      height: 64px;
      object-fit: contain;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.7));
    }

    .card-name {
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 1px 3px rgba(0,0,0,0.9);
      text-align: center;
    }

    .card-role {
      font-size: 10px;
      font-weight: 700;
      color: #fff;
      border-radius: 4px;
      padding: 2px 7px;
    }

    .card-cc {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
      justify-content: center;
    }
    .cc-tag {
      font-size: 8px;
      font-weight: 700;
      color: #fff;
      border-radius: 3px;
      padding: 1px 5px;
    }
    .cc-tag.hard { background: rgba(220, 80, 80, 0.75); }
    .cc-tag.soft { background: rgba(80, 120, 200, 0.75); }
  </style>
</head>
<body>
  <div class="game-bg"></div>

  <!-- ゲームUIダミー -->
  <div class="game-header">
    <div class="label">最終準備中</div>
    <div class="count">43</div>
  </div>

  <div class="trainers">
    <div class="trainer-dummy"><div class="t-icon"></div><div class="t-name">トレーナー2</div></div>
    <div class="trainer-dummy"><div class="t-icon"></div><div class="t-name">トレーナー1</div></div>
    <div class="trainer-dummy"><div class="t-icon"></div><div class="t-name">はりせんBT</div></div>
    <div class="trainer-dummy"><div class="t-icon"></div><div class="t-name">トレーナー3</div></div>
    <div class="trainer-dummy"><div class="t-icon"></div><div class="t-name">トレーナー4</div></div>
  </div>

  <div class="red-outline"></div>

  <!-- オーバーレイ -->
  <div id="top-bar">
    <div class="top-card">
      <img src="images/t_Square_Cramorant.png">
      <div class="card-name">ウッウ</div>
      <div class="card-role" style="background:#e74c3c">アタッカー</div>
      <div class="card-cc">
        <span class="cc-tag soft">スタン</span>
      </div>
    </div>
    <div class="top-card">
      <img src="images/t_Square_Crustle.png">
      <div class="card-name">イワパレス</div>
      <div class="card-role" style="background:#3498db">ディフェンダー</div>
      <div class="card-cc">
        <span class="cc-tag hard">スタン</span>
        <span class="cc-tag soft">ノックバック</span>
      </div>
    </div>
    <div class="top-card">
      <img src="images/t_Square_Lucario.png">
      <div class="card-name">ルカリオ</div>
      <div class="card-role" style="background:#e67e22">バランス</div>
      <div class="card-cc">
        <span class="cc-tag soft">ノックバック</span>
        <span class="cc-tag hard">スタン</span>
      </div>
    </div>
    <div class="top-card">
      <img src="images/t_Square_Wigglytuff.png">
      <div class="card-name">プクリン</div>
      <div class="card-role" style="background:#9b59b6">サポート</div>
      <div class="card-cc">
        <span class="cc-tag hard">眠り</span>
        <span class="cc-tag hard">スタン</span>
      </div>
    </div>
    <div class="top-card">
      <img src="images/t_Square_Eldegoss.png">
      <div class="card-name">ワタシラガ</div>
      <div class="card-role" style="background:#9b59b6">サポート</div>
      <div class="card-cc">
        <span class="cc-tag soft">スロー</span>
      </div>
    </div>
  </div>
</body>
</html>
