<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>スロット検出プレビュー</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1d26; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; padding: 16px; }
    h2 { font-size: 15px; margin-bottom: 12px; }
    .container { display: flex; gap: 16px; }
    .screenshot { flex: 1; }
    .screenshot img { width: 100%; border: 1px solid #444; }
    .slots { width: 220px; display: flex; flex-direction: column; gap: 8px; }
    .slot { background: #252836; border: 1px solid #3a3f52; border-radius: 6px; padding: 8px; display: flex; align-items: center; gap: 8px; }
    .slot img { width: 64px; height: 64px; object-fit: contain; border: 1px solid #555; }
    .slot-info { font-size: 11px; }
    .slot-name { font-weight: 700; font-size: 13px; }
    .matched { color: #4caf50; }
    .unmatched { color: #e74c3c; }
    .unpicked { color: #e67e22; }
    #status { font-size: 12px; color: #888; margin-bottom: 8px; }
  </style>
</head>
<body>
  <h2>スロット検出プレビュー（自動更新）</h2>
  <div id="status">読み込み中...</div>
  <div class="container">
    <div class="screenshot"><img id="ss" src=""></div>
    <div class="slots" id="slots"></div>
  </div>
  <script>
    async function refresh() {
      try {
        const res = await fetch('/slot-preview');
        const data = await res.json();
        document.getElementById('ss').src = data.screenshot;
        const slotsDiv = document.getElementById('slots');
        slotsDiv.innerHTML = '';
        data.slots.forEach((s, i) => {
          const cls = s.unpicked ? 'unpicked' : (s.matched ? 'matched' : 'unmatched');
          const label = s.unpicked ? '未ピック' : (s.matched ? '★' : '×');
          const div = document.createElement('div');
          div.className = 'slot';
          div.innerHTML = `
            <img src="data:image/png;base64,${s.png}">
            <div class="slot-info">
              <div class="slot-name ${cls}">${i+5}: ${s.name} ${label}</div>
              <div>score: ${s.score.toFixed(1)} gap: ${s.gap.toFixed(1)}</div>
            </div>
          `;
          slotsDiv.appendChild(div);
        });
        document.getElementById('status').textContent = `更新: ${new Date().toLocaleTimeString()}`;
      } catch (e) {
        document.getElementById('status').textContent = 'エラー: ' + e.message;
      }
    }
    refresh();
    setInterval(refresh, 2000);
  </script>
</body>
</html>
